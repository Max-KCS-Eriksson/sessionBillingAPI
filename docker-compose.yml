services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: session_billing
      POSTGRES_USER: session_billing
      POSTGRES_PASSWORD: session_billing_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U session_billing -d session_billing"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - session-billing-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: session_billing
      POSTGRES_USER: session_billing
      POSTGRES_PASSWORD: session_billing_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      LOGGING_LEVEL_ROOT: INFO
    depends_on:
      db:
        condition: service_healthy

volumes:
  session-billing-postgres:
